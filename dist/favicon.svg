<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Card background -->
  <rect width="100" height="100" rx="16" fill="#12030a"/>
  <!-- Gold border outer -->
  <rect x="3" y="3" width="94" height="94" rx="13" fill="none" stroke="#d4a843" stroke-width="2.5"/>
  <!-- Gold border inner (double border effect) -->
  <rect x="7" y="7" width="86" height="86" rx="10" fill="none" stroke="#d4a843" stroke-width="0.8" opacity="0.4"/>

  <!-- Spade symbol -->
  <!-- Left lobe -->
  <circle cx="40" cy="43" r="14" fill="#d4a843"/>
  <!-- Right lobe -->
  <circle cx="60" cy="43" r="14" fill="#d4a843"/>
  <!-- Top point -->
  <polygon points="50,16 63,44 37,44" fill="#d4a843"/>
  <!-- Bottom triangle -->
  <polygon points="50,72 43,58 57,58" fill="#d4a843"/>
  <!-- Stem -->
  <rect x="46" y="57" width="8" height="14" fill="#d4a843"/>
  <!-- Base spread -->
  <rect x="35" y="69" width="30" height="5" rx="2.5" fill="#d4a843"/>

  <!-- "MINDI" text at bottom -->
  <text
    x="50" y="90"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="11"
    font-weight="700"
    fill="#d4a843"
    letter-spacing="3"
  >MINDI</text>
</svg>
