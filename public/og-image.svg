<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#120404"/>
      <stop offset="50%" style="stop-color:#1e0808"/>
      <stop offset="100%" style="stop-color:#2a0f0f"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0cc6e"/>
      <stop offset="100%" style="stop-color:#b8892a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(212,168,67,0.04)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Corner suit symbols -->
  <text x="40" y="90" font-size="80" fill="rgba(212,168,67,0.06)" font-family="serif">♠</text>
  <text x="1090" y="90" font-size="80" fill="rgba(212,168,67,0.06)" font-family="serif">♥</text>
  <text x="40" y="610" font-size="80" fill="rgba(212,168,67,0.06)" font-family="serif">♦</text>
  <text x="1090" y="610" font-size="80" fill="rgba(212,168,67,0.06)" font-family="serif">♣</text>

  <!-- Left card decoration -->
  <g transform="translate(140, 315)" opacity="0.15">
    <rect x="-55" y="-80" width="110" height="160" rx="14" fill="none" stroke="#d4a843" stroke-width="2"/>
    <text x="0" y="15" text-anchor="middle" font-size="60" fill="#d4a843" font-family="serif">♠</text>
  </g>

  <!-- Right card decoration -->
  <g transform="translate(1060, 315)" opacity="0.15">
    <rect x="-55" y="-80" width="110" height="160" rx="14" fill="none" stroke="#e05555" stroke-width="2"/>
    <text x="0" y="15" text-anchor="middle" font-size="60" fill="#e05555" font-family="serif">♥</text>
  </g>

  <!-- Central spade icon -->
  <g transform="translate(600, 200)" filter="url(#glow)">
    <circle cx="-28" cy="12" r="30" fill="url(#goldGrad)"/>
    <circle cx="28" cy="12" r="30" fill="url(#goldGrad)"/>
    <polygon points="0,-48 34,18 -34,18" fill="url(#goldGrad)"/>
    <polygon points="0,60 -14,24 14,24" fill="url(#goldGrad)"/>
    <rect x="-9" y="22" width="18" height="34" fill="url(#goldGrad)"/>
    <rect x="-26" y="54" width="52" height="11" rx="5" fill="url(#goldGrad)"/>
  </g>

  <!-- Main title -->
  <text
    x="600" y="350"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="110"
    font-weight="700"
    fill="url(#goldGrad)"
    letter-spacing="18"
    filter="url(#glow)"
  >MINDI</text>

  <!-- Divider line -->
  <line x1="350" y1="380" x2="850" y2="380" stroke="#d4a843" stroke-width="1" opacity="0.4"/>

  <!-- Tagline -->
  <text
    x="600" y="430"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="26"
    fill="rgba(255,255,255,0.55)"
    letter-spacing="4"
  >THE CLASSIC INDIAN CARD GAME</text>

  <!-- Feature pills -->
  <g transform="translate(600, 490)">
    <!-- Pill 1 -->
    <rect x="-240" y="-18" width="140" height="36" rx="18" fill="rgba(212,168,67,0.08)" stroke="rgba(212,168,67,0.25)" stroke-width="1"/>
    <text x="-170" y="7" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="rgba(212,168,67,0.8)">Multiplayer</text>
    <!-- Pill 2 -->
    <rect x="-70" y="-18" width="140" height="36" rx="18" fill="rgba(212,168,67,0.08)" stroke="rgba(212,168,67,0.25)" stroke-width="1"/>
    <text x="0" y="7" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="rgba(212,168,67,0.8)">AI Opponents</text>
    <!-- Pill 3 -->
    <rect x="100" y="-18" width="140" height="36" rx="18" fill="rgba(212,168,67,0.08)" stroke="rgba(212,168,67,0.25)" stroke-width="1"/>
    <text x="170" y="7" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="rgba(212,168,67,0.8)">Free to Play</text>
  </g>

  <!-- Bottom border line -->
  <rect x="0" y="618" width="1200" height="12" fill="url(#goldGrad)" opacity="0.6"/>
</svg>
